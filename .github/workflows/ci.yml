name: CI

on:
  push:
    branches:
      - main
      - feature/capability-driven-adaptation
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint 2>&1 | tee /tmp/aura-lint.log

      - name: Upload lint failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-failure-log
          path: /tmp/aura-lint.log

      - name: Typecheck
        run: pnpm typecheck 2>&1 | tee /tmp/aura-typecheck.log

      - name: Upload typecheck failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-failure-log
          path: /tmp/aura-typecheck.log

      - name: Unit and integration tests
        run: pnpm test 2>&1 | tee /tmp/aura-tests.log

      - name: Upload test failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-log
          path: /tmp/aura-tests.log

      - name: Build
        run: pnpm build 2>&1 | tee /tmp/aura-build.log

      - name: Upload build failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: /tmp/aura-build.log

  extension-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start fixture server
        run: |
          pnpm demo:fixtures > /tmp/aura-fixtures.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/cluttered-article.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/aura-fixtures.log
          exit 1

      - name: Run Manifest V3 smoke test
        run: pnpm test:e2e 2>&1 | tee /tmp/aura-e2e.log

      - name: Upload E2E failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-log
          path: /tmp/aura-e2e.log
