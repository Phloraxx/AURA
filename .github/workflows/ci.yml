name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build, E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        shell: bash
        run: set -o pipefail; corepack pnpm lint 2>&1 | tee lint.log

      - name: Typecheck
        shell: bash
        run: set -o pipefail; corepack pnpm typecheck 2>&1 | tee typecheck.log

      - name: Unit and integration tests
        shell: bash
        run: set -o pipefail; corepack pnpm test 2>&1 | tee test.log

      - name: Build all applications
        shell: bash
        run: set -o pipefail; corepack pnpm build 2>&1 | tee build.log

      - name: Install Playwright system dependencies
        run: corepack pnpm exec playwright install-deps

      - name: Electron end-to-end tests
        run: xvfb-run -a corepack pnpm --filter @aura/browser test:e2e
        env:
          CI: 'true'
          DEBUG: pw:browser

      - name: Upload CI diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-diagnostics
          path: |
            lint.log
            typecheck.log
            test.log
            build.log
            apps/browser/playwright-report/
            apps/browser/test-results/
          if-no-files-found: ignore
          retention-days: 7
